# =============================================================
#  ビズリーチ自動スカウト（GitHub Actions 実行）
#  - 手動実行(workflow_dispatch)と定期実行(schedule)に対応
#  - 既定は DRY_RUN（実送信しない）。本番は dry_run=false を明示
#  - 状態(DB・セッション)は actions/cache で実行間に保持
#  詳細は docs/GitHub Actionsで運用.md を参照
# =============================================================
name: scout

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "実送信しない(true)/本番送信(false)"
        type: choice
        options: ["true", "false"]
        default: "true"
      search_url:
        description: "ビズリーチ保存検索の結果URL（複数可: 半角スペースか | で区切る。空なら再送のみ）"
        type: string
        default: ""
      max:
        description: "1回の最大処理件数"
        type: string
        default: "30"
      mode:
        description: "実行モード（scout / pickup / analytics=Sheets同期のみ / sync-replies=返信検知のみ / probe-replies=返信API偵察 / ほかprobe系）"
        type: choice
        options: ["scout", "pickup", "analytics", "sync-replies", "probe-replies",
                  "test-pickup-send", "probe-send", "test-send", "probe-pickup"]
        default: "scout"
  schedule:
    # GitHub の schedule は毎時00分が最も混雑し、数時間の遅延やドロップが起こり得る。
    # そのため 00分を避けた分に設定し（主実行）、さらに予備の時刻を1本用意して
    # 「その日ぜんぶ未実行」を防ぐ。重複防止(SQLite)により両方走っても二重送信にはならず、
    # concurrency(group=bizscout-scout) で同時実行もされない。
    # 定期実行は repo variables の設定値を使う。
    # 実測で1〜2.5時間ほど遅延することが分かったため、遅くなりすぎないよう
    # 従来より3時間早めた時刻に設定（体感の到着時刻を19時台後半→17時台後半に前倒し）。
    - cron: "9 7 * * *"   # 主: 16:09 JST（07:09 UTC）
    - cron: "39 9 * * *"  # 予備: 18:39 JST（09:39 UTC・主がドロップ/大幅遅延した日の保険）

# 同時実行を禁止して二重送信を防ぐ（キューイング）。
concurrency:
  group: bizscout-scout
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # 全タイムスタンプ（送信記録・週次集計）をJSTで統一する。
      TZ: "Asia/Tokyo"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BIZREACH_EMAIL: ${{ secrets.BIZREACH_EMAIL }}
      BIZREACH_PASSWORD: ${{ secrets.BIZREACH_PASSWORD }}
      BIZSCOUT_MODEL: ${{ vars.BIZSCOUT_MODEL || 'claude-opus-4-8' }}
      BIZSCOUT_MAX_SENDS_PER_RUN: ${{ vars.BIZSCOUT_MAX_SENDS_PER_RUN || '20' }}
      BIZSCOUT_GSHEET_SPREADSHEET_ID: ${{ vars.BIZSCOUT_GSHEET_SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      # --- 実行間で状態(DB・ログイン セッション)を保持 ---
      # 注意: actions/cache は最善努力。長期間未実行や容量超過で消えると
      #       重複判定/再送スケジュールがリセットされる（重複送信リスク）。
      - name: Restore state (data/)
        uses: actions/cache@v4
        with:
          path: data
          key: bizscout-data-${{ github.run_id }}
          restore-keys: |
            bizscout-data-

      # --- 設定の解決（手動入力 or repo variables）---
      # 検索URLは複数指定可（改行・半角スペース・パイプ | 区切り。カンマは不可）。
      # 複数行の値も壊れないよう env: 経由＋heredocで安全に渡す。
      - name: Resolve run config
        env:
          IN_SEARCH_URL: ${{ inputs.search_url }}
          VAR_SEARCH_URL: ${{ vars.BIZSCOUT_SEARCH_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "BIZSCOUT_DRY_RUN=${{ inputs.dry_run }}" >> "$GITHUB_ENV"
            echo "RUN_MAX=${{ inputs.max }}" >> "$GITHUB_ENV"
            echo "RUN_MODE=${{ inputs.mode }}" >> "$GITHUB_ENV"
            SEARCH_URL_VAL="$IN_SEARCH_URL"
          else
            echo "BIZSCOUT_DRY_RUN=${{ vars.BIZSCOUT_DRY_RUN || 'true' }}" >> "$GITHUB_ENV"
            echo "RUN_MAX=${{ vars.BIZSCOUT_MAX || '30' }}" >> "$GITHUB_ENV"
            echo "RUN_MODE=scout" >> "$GITHUB_ENV"
            SEARCH_URL_VAL="$VAR_SEARCH_URL"
          fi
          # 複数行対応で SEARCH_URL を渡す（1URL/行でもスペース/パイプ区切りでもOK）。
          {
            echo "SEARCH_URL<<__BIZSCOUT_EOF__"
            echo "$SEARCH_URL_VAL"
            echo "__BIZSCOUT_EOF__"
          } >> "$GITHUB_ENV"

      # --- ログイン セッションを secret から復元（2FA/bot検知回避に推奨）---
      - name: Seed Bizreach session
        env:
          STATE_B64: ${{ secrets.BIZREACH_STORAGE_STATE_B64 }}
        run: |
          if [ -n "$STATE_B64" ]; then
            mkdir -p data/sessions
            echo "$STATE_B64" | base64 -d > data/sessions/bizreach_state.json
            echo "保存済みセッションを復元しました。"
          else
            echo "セッション secret 未設定。cache のセッション、または email/password ログインに依存します。"
          fi

      - name: Preflight (doctor)
        continue-on-error: true
        run: bizscout doctor

      # 本日のピックアップ（無料枠・本命）。求人ベース＋候補者ベースの両セクションを処理。
      # 本命なので先に実行し、失敗しても検索スカウトは続行させる（continue-on-error）。
      - name: Run pickup (本日のピックアップ・無料枠・本命)
        id: pickup
        if: env.RUN_MODE == 'pickup' || github.event_name == 'schedule'
        continue-on-error: true
        env:
          # ピックアップは「本日の全対象を必ず開封（既読化）する」ため、検索スカウトの
          # RUN_MAX とは別の余裕ある上限を使う。実際に RUN_MAX=10 で 12件中2件
          # （本命のピックアップ求人2名）が未開封のまま残った事故の再発防止。
          # 送信は無料枠（プラチナ残数を消費しない）のため、検索スカウトの送信上限
          # BIZSCOUT_MAX_SENDS_PER_RUN とも切り分け、対象条件を満たす全員へ送信する。
          PICKUP_MAX: ${{ vars.BIZSCOUT_PICKUP_MAX || '50' }}
        run: |
          echo "本日のピックアップ（求人＋候補者）へ送信します（DRY_RUN=$BIZSCOUT_DRY_RUN / MAX=$PICKUP_MAX）。"
          bizscout run-pickup --kind both --max "$PICKUP_MAX"

      # ピックアップは continue-on-error のため job 全体は緑のまま進むが、
      # 認証切れ等の全滅（exit 非0）は job summary に明示して見落としを防ぐ。
      - name: Flag pickup failure
        if: steps.pickup.outcome == 'failure'
        run: |
          echo "::warning::本日のピックアップ送信が失敗しました（exit 非0）。ログを確認してください。"
          echo "⚠️ 本日のピックアップ送信が失敗しました（認証切れ・全件失敗の可能性）。" >> "$GITHUB_STEP_SUMMARY"

      # 検索スカウト（プラチナ枠）＋再送。schedule と mode=scout で実行。
      - name: Run scout (検索スカウト＋再送)
        if: env.RUN_MODE == 'scout' || github.event_name == 'schedule'
        run: |
          echo "DRY_RUN=$BIZSCOUT_DRY_RUN / MAX=$RUN_MAX / SEARCH_URL set: $([ -n "$SEARCH_URL" ] && echo yes || echo no)"
          if [ -n "$SEARCH_URL" ]; then
            bizscout serve --once --max "$RUN_MAX" --search-url "$SEARCH_URL"
          else
            bizscout serve --once --max "$RUN_MAX"
          fi

      # 送信フロー偵察モード（実送信なし）。送信API/セレクタ特定用の情報を artifact に残す。
      - name: Probe send flow (実送信なし)
        if: env.RUN_MODE == 'probe-send'
        run: |
          echo "送信フロー偵察を実行します（実送信はしません）。"
          if [ -n "$SEARCH_URL" ]; then
            bizscout probe-send --search-url "$SEARCH_URL"
          else
            echo "SEARCH_URL が未設定です。search_url を指定して再実行してください。"
            exit 1
          fi

      # 送信API検証モード（dryRun=True・実送信なし）。payload/権限の確認用。
      - name: Test send (dryRun・実送信なし)
        if: env.RUN_MODE == 'test-send'
        run: |
          echo "送信APIを dryRun=True で検証します（実送信はしません）。"
          if [ -n "$SEARCH_URL" ]; then
            bizscout test-send --search-url "$SEARCH_URL"
          else
            echo "SEARCH_URL が未設定です。search_url を指定して再実行してください。"
            exit 1
          fi

      # 本日のピックアップ候補者リストAPIの偵察（実送信なし）。
      - name: Probe pickup (実送信なし)
        if: env.RUN_MODE == 'probe-pickup'
        run: bizscout probe-pickup

      # ピックアップ送信API(/v2/scouts/pickup)の dryRun 検証（対象条件を無視・実送信なし）。
      - name: Test pickup send (dryRun・実送信なし)
        if: env.RUN_MODE == 'test-pickup-send'
        run: |
          echo "ピックアップ送信APIを dryRun=True で検証します（実送信なし・残数消費なし）。"
          bizscout test-pickup-send --kind job

      # 返信データの偵察（実送信なし）。メッセージ系画面のAPI応答を artifact に残す。
      - name: Probe replies (返信API偵察・実送信なし)
        if: env.RUN_MODE == 'probe-replies'
        run: bizscout probe-replies

      # --- スカウト分析 -------------------------------------------------------
      # 返信の自動検知（送信済み・未返信のレジュメを再取得してシグナル確認）。
      - name: Sync replies (返信自動検知)
        if: >-
          (github.event_name == 'schedule' || env.RUN_MODE == 'scout'
           || env.RUN_MODE == 'sync-replies')
        continue-on-error: true
        run: bizscout sync-replies

      # Google サービスアカウント鍵を secret から復元（キャッシュ/artifact に載る
      # data/ 配下には置かない）。secret には base64 でも「鍵JSONそのまま」でもよい。
      # この工程の失敗で送信ジョブを赤にしない（警告してスキップ）。
      - name: Seed Google service account
        if: always()
        continue-on-error: true
        env:
          GSA_B64: ${{ secrets.GSHEET_SERVICE_ACCOUNT_B64 }}
        run: |
          if [ -z "$GSA_B64" ]; then
            echo "GSHEET_SERVICE_ACCOUNT_B64 未設定。Sheets 同期はスキップされます。"
            exit 0
          fi
          out="$RUNNER_TEMP/gsa.json"
          if [ "${GSA_B64#\{}" != "$GSA_B64" ]; then
            # '{' で始まる = 鍵JSONがそのまま貼られている（base64不要の簡単ルート）。
            printf '%s' "$GSA_B64" > "$out"
          else
            # base64。コピー時に混入しがちな空白・改行を除去してから復号する。
            if ! printf '%s' "$GSA_B64" | tr -d ' \n\r\t' | base64 -d > "$out" 2>/dev/null; then
              echo "::warning::GSHEET_SERVICE_ACCOUNT_B64 を復号できませんでした。鍵JSONの中身をそのまま Secret に貼り直すのが確実です（docs/スカウト分析.md）。"
              exit 0
            fi
          fi
          if python3 -c "import json;d=json.load(open('$out'));assert d.get('client_email');print('鍵を復元:', d['client_email'])"; then
            echo "BIZSCOUT_GSHEET_CREDENTIALS=$out" >> "$GITHUB_ENV"
          else
            echo "::warning::鍵JSONの形式が不正です（client_email が見つかりません）。ダウンロードした鍵JSONの中身を全文コピーして Secret に貼り直してください。"
          fi

      # 送信・返信データを Google スプレッドシートへ同期（設定済みの場合のみ）。
      - name: Sync analytics to Google Sheets
        if: always()
        continue-on-error: true
        run: |
          if [ -n "$BIZSCOUT_GSHEET_CREDENTIALS" ] && [ -n "$BIZSCOUT_GSHEET_SPREADSHEET_ID" ]; then
            bizscout analytics sync
          else
            echo "Google Sheets 未設定のため分析同期をスキップします（docs/スカウト分析.md 参照）。"
          fi

      - name: Status report
        if: always()
        run: bizscout report || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bizscout-logs-${{ github.run_id }}
          path: |
            logs/
            data/exports/
            data/bizscout.db
          if-no-files-found: ignore
          retention-days: 14
