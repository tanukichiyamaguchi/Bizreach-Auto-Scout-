# =============================================================
#  企業情報・求人情報（経営戦略研究所株式会社）
#  文面生成プロンプトおよびマッチングロジックの「事実」の単一情報源。
#  変更時はここを編集する。
# =============================================================

company:
  name: 経営戦略研究所株式会社
  representative: 岩渕龍正
  representative_title: 代表取締役社長
  business: 医院・病院経営に特化したコンサルティングファーム
  founded: 1988
  clients: 480            # 2026年現在の担当医院数
  consultants: 30         # 在籍コンサルタント数（約）
  headquarters: 横浜市神奈川区（JR横浜駅徒歩7分）
  strengths:
    - 徹底したハンズオン型コンサルティング（机上の空論ではない現場主義）
    - 「半年で医業収入1.5倍」を実現する成果実績
    - 売上目標は一切なし。大切にしているのはクライアントの成果と長期的な関係性
    - 定期訪問（月1回）による長期的な信頼関係構築
    - セミナー開催（月平均3本、1回あたり80〜400名参加）
    - マーケティングからマネジメントまで経営全般を支援
    - 担当クライアント数：15〜20医院
  culture:
    - 月2日の全社集結日（全体会議・面談・部活・社員旅行・表彰・誕生日祝い）
    - 目先の売上よりクライアントの利益を最優先する文化
    - 年齢・社歴に関係なく正当評価

job:
  title: 経営コンサルタント
  # スカウト送信に使う求人ID（求人管理ID）。ハイクラス/タレント両方に送れる求人を指定する。
  # 保存検索に紐づく求人ではなく、この求人IDでスカウトを送る（会員種別を問わず送れる求人）。
  # 環境変数 BIZSCOUT_SCOUT_JOB_ID でも上書き可能。
  scout_job_id: "7437375"   # 【ALL】経営コンサルタント（Talent・HighClass両対応）
  employment_type: 正社員
  headcount: 3
  location: 全国クライアント医院（月15〜20件）※出張あり、転勤なし
  working_hours: シフト制（変形労働時間制）
  salary:
    first_year: 650万〜700万円（月給35万円＋賞与）
    average: 約1,200万円
    models:
      - { year: 2, amount: 990万円, clients: 15 }
      - { year: 4, amount: 1,180万円, clients: 17 }
      - { year: 7, amount: 2,000万円, clients: 20 }
      - { year: 8, amount: 2,760万円, clients: 18, note: チーフ }
    bonus: 年2回（夏：基本給1ヶ月、冬：2ヶ月＋業績）
    raise: 年1回
    annual_holidays: 120
  benefits:
    - 社会保険完備、企業型確定拠出年金
    - 住宅手当（世帯主）、扶養手当（1人1万円）、出張手当（1回5,000円）
    - コンサルティング日当あり（5,000円、平均月43,500円）
    - 社外研修補助（年間10万円）
    - 社員旅行（過去実績：沖縄・グアム・チェジュ島ほか）
    - 産休・育休実績あり
  onboarding:
    - 6ヶ月間の研修カリキュラム（300以上のノウハウ習得）
    - 医院現場研修・コンサルティング同行
    - カリキュラム修了＆テスト合格後、正式にコンサルタントとして独り立ち

requirements:
  must:
    - 大学・大学院卒業以上
    - "社会人経験3年以上 / 社内表彰歴・高い達成歴・リーダー職経験 / 無形商材での営業経験2年以上 のいずれか"
    - Word・Excel・PowerPoint
  want:
    - 高い実績（表彰歴、高い達成率、リーダー職経験）
    - クライアントとの長期的な信頼関係構築を望む方
    - ハンズオン型コンサルティングに魅力を感じる方
    - コンサルタントとして成長したい方
    - 困難を乗り越え成長した経験のある方

